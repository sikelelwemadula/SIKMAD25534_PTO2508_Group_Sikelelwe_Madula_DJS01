<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast App</title>
    <link rel="stylesheet" href="styles.css">
    <link 
        href="http://fonts.googleapis.com/css2?family=Inter&display=swap" 
        rel="stylesheet"
        >
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <img src="podcast- (1).png" alt="Podcast Icon" class="logo">
            <h1>Podcast App</h1>
        </div>
            <div class="header-right">
            <button class="icon-btn" aria-label="Search">
            <img src="search.png" class="search-icon"></i> <!-- Replace with SVG/Icon Font -->
    </button>
    <img src="male-head-with-hair_42192.png" alt="User Profile" class="profile-avatar">
  </div>
    </header>

    <main id="podcastGrid" class="grid-container"></main>

    <!---Podcast Card Modal--->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="title-section">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" id="closeModal" >&times;</button>
            </div>
            <div class="banner">
                <img id="modalImage" class="modal-img">
                <div class="info-section">
                    <h3>Description</h3>
                    <p id="modalDesc"></p>
                    <h3>Genres</h3>
                    <div id="modalGenres" class="genre-tags"></div>
                    <p id="modalUpdated" class="modal-updated-text"></p>
                </div>
            </div>
            <h3>Seasons</h3>
            <ul id="seasonList" class="season-list"></ul>
        </div>
    </div>

    <script type="module" src="./src/index.js"></script>
</body>
</html>
